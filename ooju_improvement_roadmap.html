
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-mono); }
  .root { padding: 1.5rem 0; }

  .phase-header {
    display: flex; align-items: center; gap: 12px;
    padding: 0.6rem 1rem; cursor: pointer;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    margin-bottom: 2px;
    user-select: none;
    transition: background 0.15s;
  }
  .phase-header:hover { background: var(--color-background-secondary); }
  .phase-num {
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 999px; white-space: nowrap;
  }
  .phase-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .phase-tag { font-size: 11px; color: var(--color-text-tertiary); }
  .chevron { font-size: 12px; color: var(--color-text-tertiary); transition: transform 0.2s; }
  .chevron.open { transform: rotate(90deg); }

  .phase-body { display: none; padding: 0 0 16px 0; }
  .phase-body.open { display: block; }

  .item {
    border-left: 2px solid var(--color-border-tertiary);
    margin: 8px 0 8px 12px;
    padding: 10px 14px;
    background: var(--color-background-secondary);
    border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
  }
  .item-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .item-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 999px;
    font-weight: 500; white-space: nowrap; margin-top: 1px;
  }
  .item-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .item-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 8px; }

  .code-block {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.7;
    color: var(--color-text-primary);
    white-space: pre;
    overflow-x: auto;
    margin-bottom: 6px;
  }
  .code-block .cmt { color: var(--color-text-tertiary); }
  .code-block .kw { color: #185FA5; }
  .code-block .good { color: #3B6D11; }
  .code-block .bad { color: #A32D2D; }
  .code-block .str { color: #854F0B; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .pill {
    font-size: 11px; padding: 2px 10px; border-radius: 999px;
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary); background: var(--color-background-primary);
  }

  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px; margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 12px 14px;
  }
  .stat-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }

  .section-label {
    font-size: 11px; font-weight: 500; color: var(--color-text-tertiary);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 1.2rem 0 0.5rem;
  }

  .tag-critical { background: #FCEBEB; color: #A32D2D; }
  .tag-structural { background: #FAEEDA; color: #854F0B; }
  .tag-design { background: #E6F1FB; color: #185FA5; }
  .tag-runtime { background: #EAF3DE; color: #3B6D11; }
  .tag-future { background: #EEEDFE; color: #534AB7; }

  .bl-critical { border-color: #E24B4A; }
  .bl-structural { border-color: #EF9F27; }
  .bl-design { border-color: #378ADD; }
  .bl-runtime { border-color: #639922; }
  .bl-future { border-color: #7F77DD; }

  .ask-btn {
    font-size: 11px; padding: 4px 10px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: transparent; cursor: pointer;
    color: var(--color-text-secondary);
    transition: background 0.15s;
    margin-top: 6px;
  }
  .ask-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="root">
  <h2 class="sr-only">Ooju language improvement roadmap</h2>

  <div class="summary-grid">
    <div class="stat-card"><div class="stat-label">total fixes</div><div class="stat-val">17</div></div>
    <div class="stat-card"><div class="stat-label">critical bugs</div><div class="stat-val">4</div></div>
    <div class="stat-card"><div class="stat-label">phases</div><div class="stat-val">5</div></div>
    <div class="stat-card"><div class="stat-label">est. effort</div><div class="stat-val">~3 wk</div></div>
  </div>

  <div id="phases"></div>
</div>

<script>
const PHASES = [
  {
    id: "p1", num: "Phase 1", title: "Fix bugs breaking things right now",
    tag: "Do this today", color: "critical",
    items: [
      {
        badge: "bug", bcolor: "critical",
        title: "parts.insert(-1, x) in parse_condition()",
        desc: "insert(-1, x) inserts BEFORE the last element, not after. This produces wrong operator order in conditions silently — worst kind of bug.",
        before: `if self.peek().value == "besi":
    self.consume()
    parts.insert(-1, ">")  <span class='bad'># WRONG — inserts before last element</span>`,
        after: `if self.peek().value == "besi":
    self.consume()
    parts.append(">")  <span class='good'># CORRECT</span>`,
        pills: ["parse_condition()", "silent wrong output"],
        ask: "Show me the full fixed parse_condition() method"
      },
      {
        badge: "bug", bcolor: "critical",
        title: "open() without close() in stdlib codegen",
        desc: "file_poha and file_likha generate dangling file handles. Data loss on PyPy, ResourceWarning on CPython. file_likha needs a with-block.",
        before: `<span class='bad'>expr = f"open({node.args[0]}).read()"
expr = f"open({node.args[0]}, 'w').write({node.args[1]})"</span>`,
        after: `<span class='good'>expr = f"open({node.args[0]}, encoding='utf-8').read()"
# for write, emit a with-block:
lines = [
    f"with open({node.args[0]}, 'w', encoding='utf-8') as _f:",
    f"    _f.write({node.args[1]})"
]</span>`,
        pills: ["codegen.py", "file I/O", "resource leak"],
        ask: "Write the corrected file_likha codegen block"
      },
      {
        badge: "bug", bcolor: "critical",
        title: "DoWhileConditionNode is a ghost class",
        desc: "A throwaway class defined inside parse_statement() at runtime. Invisible to any visitor, linter, or type checker you'll ever write.",
        before: `<span class='bad'>if self.peek().value != "bare":
    class DoWhileConditionNode:   # defined inside a function!
        def __init__(self, c, l):
            self.condition = c
            self.is_do_while_cond = True</span>`,
        after: `<span class='good'># In parser.py, top level with all other nodes:
@dataclass
class DoWhileCondNode:
    condition: str
    line: int
    is_do_while_cond: bool = True</span>`,
        pills: ["parser.py", "AST integrity"],
        ask: "Show me how to refactor the do-while parsing to use DoWhileCondNode properly"
      },
      {
        badge: "dead code", bcolor: "structural",
        title: "stdlib.py is disconnected from codegen.py",
        desc: "STDLIB_IMPORTS dict is defined but never imported or used. The real import logic is duplicated inline in codegen. One of them must die.",
        before: `<span class='bad'># stdlib.py — defined but never used anywhere
STDLIB_IMPORTS = { "random": "import random", ... }

# codegen.py — duplicates the same logic inline
import_map = { "random": "import random", ... }</span>`,
        after: `<span class='good'># stdlib.py — single source of truth
STDLIB_IMPORTS = { "random": "import random", ... }

# codegen.py — import and use it
from ooju.stdlib import STDLIB_IMPORTS
require_preamble(STDLIB_IMPORTS.get(node.func, ""))</span>`,
        pills: ["stdlib.py", "codegen.py", "DRY"],
        ask: "Rewrite stdlib.py and the codegen stdlib section to be properly connected"
      }
    ]
  },
  {
    id: "p2", num: "Phase 2", title: "Build the expression parser (Pratt)",
    tag: "The real work — 2-3 days", color: "critical",
    items: [
      {
        badge: "architecture", bcolor: "critical",
        title: "AST nodes store expressions as raw strings",
        desc: "AssignNode.value is str. PrintNode.args is str. This means you have no expression tree — no precedence, no type info, no analysis possible. The AST is hollow.",
        before: `<span class='bad'>@dataclass
class AssignNode:
    name: str
    value: str    # "x + 1 * 2" — just a dumb string
    line: int</span>`,
        after: `<span class='good'>@dataclass
class AssignNode:
    name: str
    value: ExprNode   # real tree: BinOp(Ident("x"), "+", BinOp(...))
    line: int</span>`,
        pills: ["parser.py", "all AST nodes"],
        ask: "Write all the ExprNode dataclasses I need (NumberLiteral, StringLiteral, BinOpNode, UnaryOpNode, CallNode, IndexNode, ListLiteral, DictLiteral)"
      },
      {
        badge: "architecture", bcolor: "critical",
        title: "Write parse_expr() using Pratt parsing",
        desc: "Pratt parsing handles operator precedence correctly in ~80 lines. It's the standard technique used in Rust, V8, and most production compilers.",
        before: `<span class='bad'>def collect_expr(self, stop_at_rparen=False) -> str:
    parts = []
    while ...:
        parts.append(self.consume().value)
    return " ".join(parts)   # tokens dumped back to string</span>`,
        after: `<span class='good'>PRECEDENCE = {
    "or": 1, "and": 2, "==": 4, "!=": 4,
    "<": 5, ">": 5, "<=": 5, ">=": 5,
    "+": 6, "-": 6, "*": 7, "/": 7, "%": 7,
}
def parse_expr(self, min_prec=0) -> ExprNode:
    left = self.parse_primary()
    while True:
        op = self.peek().value
        prec = PRECEDENCE.get(op, -1)
        if prec < min_prec: break
        self.consume()
        right = self.parse_expr(prec + 1)
        left = BinOpNode(left, op, right, ...)
    return left</span>`,
        pills: ["parser.py", "Pratt parsing", "operator precedence"],
        ask: "Write the complete parse_expr() and parse_primary() Pratt parser for Ooju"
      },
      {
        badge: "architecture", bcolor: "critical",
        title: "Add emit_expr() to codegen",
        desc: "Once AST nodes hold ExprNodes, codegen needs a recursive emitter that walks the tree and produces Python code strings.",
        before: `<span class='bad'># codegen just dumps the string directly
add(f"{pad}{node.name} = {node.value}", node.line)
#                               ^^^ was already a string, nothing to emit</span>`,
        after: `<span class='good'>def emit_expr(node) -> str:
    if isinstance(node, NumberLiteral): return node.value
    if isinstance(node, BinOpNode):
        return f"({emit_expr(node.left)} {node.op} {emit_expr(node.right)})"
    if isinstance(node, CallNode):
        args = ", ".join(emit_expr(a) for a in node.args)
        return f"{node.func}({args})"
    ...

add(f"{pad}{node.name} = {emit_expr(node.value)}", node.line)</span>`,
        pills: ["codegen.py"],
        ask: "Write the complete emit_expr() function for all ExprNode types"
      }
    ]
  },
  {
    id: "p3", num: "Phase 3", title: "Fix structural architecture",
    tag: "After Phase 2", color: "structural",
    items: [
      {
        badge: "architecture", bcolor: "structural",
        title: "Move import resolution out of codegen",
        desc: "generate() reads the filesystem. Code generation must be a pure function. File I/O belongs in a separate resolver pass between parse and generate.",
        before: `<span class='bad'># INSIDE generate() — filesystem I/O in a code generator!
elif isinstance(node, ImportNode):
    imported_code = Path(node.path).read_text()
    imported_tokens = tokenize(imported_code, node.path)
    imported_ast = parse(imported_tokens, node.path)
    ...</span>`,
        after: `<span class='good'># New file: resolver.py
def resolve_imports(ast, base_path) -> list:
    result = []
    for node in ast:
        if isinstance(node, ImportNode):
            code = Path(node.path).read_text(encoding="utf-8")
            tokens = tokenize(code, node.path)
            child_ast = parse(tokens, node.path)
            result.extend(resolve_imports(child_ast, node.path))
        else:
            result.append(node)
    return result

# Pipeline in cli.py:
# tokenize → parse → resolve_imports → generate</span>`,
        pills: ["codegen.py", "resolver.py", "cli.py", "purity"],
        ask: "Write the complete resolver.py module for Ooju"
      },
      {
        badge: "security", bcolor: "structural",
        title: "Sandbox file and network access",
        desc: "file_poha, file_likha, http_lua give raw filesystem and network access with zero validation. A beginner language should not do this by default.",
        before: `<span class='bad'># Any .oj file can do this with zero warnings:
dhora x = file_poha("../../etc/passwd")
dhora y = http_lua("http://malicious.com")</span>`,
        after: `<span class='good'># cli.py — opt-in flags
parser.add_argument("--allow-file", action="store_true")
parser.add_argument("--allow-network", action="store_true")

# Pass capabilities into generate()
# codegen raises OojuPermissionError if flag not set:
if node.func == "file_poha" and not caps.allow_file:
    raise OojuPermissionError(
        node.line,
        "file_poha use koribole --allow-file flag lagibe"
    )</span>`,
        pills: ["cli.py", "codegen.py", "security"],
        ask: "Write the capabilities system for Ooju's file and network access"
      },
      {
        badge: "design", bcolor: "design",
        title: "Replace Python keywords leaking into Ooju",
        desc: "True, False, None, and, or, not, in, is are Python internals exposed directly. A beginner Assamese-first language shouldn't require knowing Python capitalisation rules.",
        before: `<span class='bad'>jodi (x == True) hoi:      # Python's True
jodi (x and y) hoi:        # Python's and
jodi (x is None) hoi:      # Python's None</span>`,
        after: `<span class='good'>jodi (x == xahi) hoi:      # xahi = true  (সঁচা)
jodi (x aru y) hoi:        # aru  = and
jodi (x == nai) hoi:       # nai  = none/null

# Add to ASSAMESE_TO_ROMANIZED_KEYWORDS in tokenizer.py:
"xahi": "True", "mitha": "False",
"nai": "None", "aru": "and",
"nahole": "or", "nohoi": "not"</span>`,
        pills: ["tokenizer.py", "language identity"],
        ask: "Give me the full keyword replacement table for Ooju's Assamese-first identity"
      },
      {
        badge: "design", bcolor: "design",
        title: "Split dhora into declaration vs reassignment",
        desc: "dhora x = 1 and dhora x = x + 1 look identical. Beginners learn the wrong mental model. Add sali (replace/change) for reassignment.",
        before: `<span class='bad'>dhora x = 5      # declaration
dhora x = x + 1  # reassignment — same keyword, different concept</span>`,
        after: `<span class='good'>dhora x = 5      # first declaration only
sali x = x + 1   # reassignment — sali = replace/update

# Parser: dhora → AssignNode (new var)
# Parser: sali  → ReassignNode (existing var)
# Analyser: error if sali used before dhora</span>`,
        pills: ["tokenizer.py", "parser.py", "pedagogy"],
        ask: "Help me implement the sali keyword for Ooju reassignment"
      }
    ]
  },
  {
    id: "p4", num: "Phase 4", title: "Harden the runtime & REPL",
    tag: "Polish pass", color: "runtime",
    items: [
      {
        badge: "UX", bcolor: "runtime",
        title: "Wire up sourcemap to show Ooju line numbers on errors",
        desc: "You built a sourcemap but never used it. Beginners currently see raw Python tracebacks with no Ooju context.",
        before: `<span class='bad'># cli.py — user sees Python traceback, useless to a beginner
except Exception as exc:
    print(f"Ooju runtime error in {file_path}: {exc}", file=sys.stderr)</span>`,
        after: `<span class='good'>except Exception as exc:
    import traceback
    tb = traceback.extract_tb(exc.__traceback__)
    for frame in reversed(tb):
        oj_line = sourcemap.get(frame.lineno)
        if oj_line:
            src_line = source_lines[oj_line - 1].strip()
            print(f"\\noi! Line {oj_line}-t bhul:", file=sys.stderr)
            print(f"  code : {src_line}", file=sys.stderr)
            print(f"  kiba : {type(exc).__name__}: {exc}", file=sys.stderr)
            return 1
    print(f"Runtime error: {exc}", file=sys.stderr)</span>`,
        pills: ["cli.py", "sourcemap", "error UX"],
        ask: "Write the full sourcemap error handler for Ooju's CLI"
      },
      {
        badge: "UX", bcolor: "runtime",
        title: "REPL block detection via tokenizer, not ':' character",
        desc: "The REPL checks if a line ends with ':' to know if a block is open. This fails for brace blocks and for ':' inside strings.",
        before: `<span class='bad'># repl.py — raw character scan
if line.rstrip().endswith(":"):
    indent_expected = True
    continue</span>`,
        after: `<span class='good'>def is_complete(code: str) -> bool:
    try:
        tokens = tokenize(code, "<repl>")
        indent_depth = sum(
            1 if t.type == TT.INDENT else
            -1 if t.type == TT.DEDENT else 0
            for t in tokens
        )
        return indent_depth == 0
    except TokenizeError:
        return False  # incomplete, keep buffering</span>`,
        pills: ["repl.py", "tokenizer"],
        ask: "Write the complete improved REPL block detection logic"
      },
      {
        badge: "UX", bcolor: "runtime",
        title: "lua() needs a visible prompt parameter",
        desc: "lua silently uses \"\" as prompt. The input() call works but the user sees a blank cursor with no instruction — confusing for beginners.",
        before: `<span class='bad'>if self.peek().type == TT.IDENT:
    name = self.consume().value
    self.skip_newlines()
    return InputNode(name, '""', t.line)  # always empty prompt</span>`,
        after: `<span class='good'># Allow: dhora naam = lua("Tomar naam ki?")
# Allow: lua naam  (no prompt, empty string default)
# Parser: if next token is LPAREN, collect prompt expr
# Emit:   naam = input("Tomar naam ki?")</span>`,
        pills: ["parser.py", "codegen.py"],
        ask: "Fix the lua() parser to support an optional prompt string"
      }
    ]
  },
  {
    id: "p5", num: "Phase 5", title: "Language features (future)",
    tag: "Plan now, build later", color: "future",
    items: [
      {
        badge: "feature", bcolor: "future",
        title: "String interpolation with {variable} syntax",
        desc: "Beginners always want to print mixed strings and variables. Requires Phase 2's expression parser to be in place first.",
        before: `<span class='bad'>kua("Namaskar " + naam + "!")  # clunky, error-prone</span>`,
        after: `<span class='good'>kua("Namaskar {naam}!")  # translates to f"Namaskar {naam}!"
# In codegen, detect strings containing {ident}
# and emit as Python f-strings automatically</span>`,
        pills: ["codegen.py", "StringLiteral", "f-strings"],
        ask: "Design the string interpolation system for Ooju"
      },
      {
        badge: "feature", bcolor: "future",
        title: "Type inference pass (lite)",
        desc: "Once you have a real expression tree from Phase 2, a simple one-pass type inference can catch type errors before exec() ever runs.",
        before: `<span class='bad'># Currently silently passes, explodes at runtime:
dhora x = 5
dhora y = x + "hello"  # TypeError only at exec() time</span>`,
        after: `<span class='good'># New file: analyser.py
# Walk AST, infer types, raise AnalysisError early:
# "Line 2: x ta number, kintu 'hello' ta string —
#  dutu ek lage naai"</span>`,
        pills: ["analyser.py", "type safety"],
        ask: "Design a simple type inference pass for Ooju"
      },
      {
        badge: "feature", bcolor: "future",
        title: "kaam functions need namespace isolation",
        desc: "Two imported .oj files with the same function name silently overwrite each other. Needs a module system after resolver.py is built.",
        before: `<span class='bad'># utils.oj and math.oj both define kaam helper():
# the second import silently overwrites the first</span>`,
        after: `<span class='good'># ona "utils.oj" as util_kaam
# util_kaam.helper()  →  utils_helper()
# Namespace mangling at codegen time: {module}_{func}</span>`,
        pills: ["resolver.py", "ImportNode", "namespacing"],
        ask: "Design the module namespace system for Ooju imports"
      }
    ]
  }
];

function render() {
  const container = document.getElementById("phases");
  PHASES.forEach(phase => {
    const wrap = document.createElement("div");
    wrap.style.marginBottom = "6px";

    const colorMap = {
      critical: { bg: "#FCEBEB", text: "#A32D2D" },
      structural: { bg: "#FAEEDA", text: "#854F0B" },
      design: { bg: "#E6F1FB", text: "#185FA5" },
      runtime: { bg: "#EAF3DE", text: "#3B6D11" },
      future: { bg: "#EEEDFE", text: "#534AB7" }
    };
    const c = colorMap[phase.color];

    wrap.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <span class="phase-num" style="background:${c.bg};color:${c.text}">${phase.num}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-tag">${phase.tag}</span>
        <span class="chevron" id="chev-${phase.id}">▶</span>
      </div>
      <div class="phase-body" id="body-${phase.id}">
        ${phase.items.map(item => renderItem(item, phase.color, colorMap)).join("")}
      </div>
    `;
    container.appendChild(wrap);
  });
}

function renderItem(item, phaseColor, colorMap) {
  const c = colorMap[item.bcolor];
  const blClass = `bl-${item.bcolor}`;
  const before = item.before ? `
    <div class="section-label">before</div>
    <div class="code-block">${item.before}</div>
  ` : "";
  const after = item.after ? `
    <div class="section-label">after</div>
    <div class="code-block">${item.after}</div>
  ` : "";
  const pills = item.pills.map(p => `<span class="pill">${p}</span>`).join("");
  const askBtn = item.ask ? `<button class="ask-btn" onclick="sendPrompt('${item.ask.replace(/'/g, "\\'")}')">ask claude about this ↗</button>` : "";
  return `
    <div class="item ${blClass}">
      <div class="item-top">
        <span class="item-badge" style="background:${c.bg};color:${c.text}">${item.badge}</span>
        <span class="item-title">${item.title}</span>
      </div>
      <p class="item-desc">${item.desc}</p>
      ${before}${after}
      <div class="pill-row">${pills}</div>
      ${askBtn}
    </div>
  `;
}

function togglePhase(id) {
  const body = document.getElementById("body-" + id);
  const chev = document.getElementById("chev-" + id);
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  chev.classList.toggle("open", !isOpen);
}

render();
</script>
